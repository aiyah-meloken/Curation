name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_AUTHING_APP_ID: ${{ vars.VITE_AUTHING_APP_ID }}
          VITE_AUTHING_DOMAIN: ${{ vars.VITE_AUTHING_DOMAIN }}
          VITE_AUTHING_REDIRECT_URI: ${{ vars.VITE_AUTHING_REDIRECT_URI }}
        with:
          tagName: v__VERSION__ # The version will be extracted from tauri.conf.json
          releaseName: 'Curation v__VERSION__'
          releaseBody: |
            ## Downloads

            | File | Platform |
            |------|----------|
            | `Curation_x.x.x_aarch64.dmg` | **macOS** — Apple Silicon (M1 / M2 / M3 / M4) |
            | `Curation_x.x.x_x64-setup.exe` | **Windows** — recommended installer |
            | `Curation_x.x.x_x64_en-US.msi` | **Windows** — MSI alternative |
            | `Curation_aarch64.app.tar.gz` `*.sig` `latest.json` | Auto-updater files — no need to download manually |

            > **Intel Mac not supported yet.** If you need Intel Mac support, please open an issue.

            ---

            ## macOS Installation

            macOS blocks apps without an Apple Developer certificate. After installing, run this once in Terminal to remove the restriction:

            1. Open the `.dmg` and drag **Curation.app** to the Applications folder
            2. Open **Terminal** and run:

            ```bash
            xattr -cr /Applications/Curation.app
            ```

            3. Open the app normally. You will not need to repeat this for future updates.

            ---

            ## Requirements

            This app requires **Curation Server** to be running locally. Contact the admin for setup instructions if you haven't received them.
          releaseDraft: true
          prerelease: false
