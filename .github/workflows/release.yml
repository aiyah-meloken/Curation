name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_AUTHING_APP_ID: ${{ vars.VITE_AUTHING_APP_ID }}
          VITE_AUTHING_DOMAIN: ${{ vars.VITE_AUTHING_DOMAIN }}
          VITE_AUTHING_REDIRECT_URI: ${{ vars.VITE_AUTHING_REDIRECT_URI }}
        with:
          tagName: v__VERSION__
          releaseName: 'Curation v__VERSION__'
          releaseBody: |
            ## Downloads

            | File | Platform |
            |------|----------|
            | `Curation_x.x.x_aarch64.dmg` | **macOS** — Apple Silicon (M1 / M2 / M3 / M4) |
            | `Curation_x.x.x_x64-setup.exe` | **Windows** — recommended installer |
            | `Curation_x.x.x_x64_en-US.msi` | **Windows** — MSI alternative |
            | `Curation_aarch64.app.tar.gz` `*.sig` `latest.json` | Auto-updater files — no need to download manually |

            > **Intel Mac not supported yet.** If you need Intel Mac support, please open an issue.

            ---

            ## macOS Installation

            macOS blocks apps without an Apple Developer certificate. After installing, run this once in Terminal to remove the restriction:

            1. Open the `.dmg` and drag **Curation.app** to the Applications folder
            2. Open **Terminal** and run:

            ```bash
            xattr -cr /Applications/Curation.app
            ```

            3. Open the app normally. You will not need to repeat this for future updates.

            ---

            ## Requirements

            This app requires **Curation Server** to be running locally. Contact the admin for setup instructions if you haven't received them.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

      # macOS only: sign the repackaged tar.gz and upload latest.json
      - name: Upload updater artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAR_GZ=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz" | head -1)
          FILENAME=$(basename "$TAR_GZ")

          # Sign the tar.gz that tauri-action repackaged
          npx @tauri-apps/cli signer sign "$TAR_GZ" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
          SIG=$(cat "${TAR_GZ}.sig")

          # Upload the .sig file
          gh release upload "v${VERSION}" "${TAR_GZ}.sig" --clobber

          # Generate and upload latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/aiyah-meloken/Curation/releases/download/v${VERSION}/${FILENAME}"
              }
            }
          }
          EOF
          gh release upload "v${VERSION}" latest.json --clobber
